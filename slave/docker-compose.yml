version: '3.8'

services:
  mysql-slave:
    image: mysql:8.0
    container_name: mysql-slave
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: $MYSQL_SLAVE_PASS
      MYSQL_HISTFILE: /var/lib/mysql/.mysql_history
    ports:
      - "23306:3306"
    volumes:
      - ./data/var/lib/mysql:/var/lib/mysql
      - ./data/root/.mysql_history:/root/.mysql_history   # 新增：掛載 mysql history 檔案
      - ./slave.cnf:/etc/mysql/conf.d/slave.cnf
    command: 
      - --default-authentication-plugin=mysql_native_password
    networks:
      - mysql-net

networks:
  mysql-net:
    driver: bridge
