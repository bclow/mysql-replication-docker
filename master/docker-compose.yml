version: '3.8'

services:
  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_password
      MYSQL_DATABASE: testdb
      MYSQL_HISTFILE: /var/lib/mysql/.mysql_history
    ports:
      - "13306:3306"
    volumes:
      - ./data/var/lib/mysql:/var/lib/mysql
      - ./data/root/.mysql_history:/root/.mysql_history   # 新增：掛載 mysql history 檔案
      - ./master.cnf:/etc/mysql/conf.d/master.cnf
    command: 
      - --default-authentication-plugin=mysql_native_password
    networks:
      - mysql-net

networks:
  mysql-net:
    driver: bridge
